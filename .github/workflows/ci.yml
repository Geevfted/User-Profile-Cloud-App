name: Cloud Profile App CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node Dependencies
        run: npm install

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        working-directory: Terraform
        run: terraform fmt -check

      - name: Terraform Init
        working-directory: Terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: Terraform
        run: terraform validate

      - name: Build Docker Image
        run: docker build -t user-profile-cloud-app .

      - name: Validate Docker Compose
        run: docker compose config

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Image
        run: |
          docker tag user-profile-cloud-app ghcr.io/geevfted/user-profile-cloud-app:latest
          docker push ghcr.io/geevfted/user-profile-cloud-app:latest