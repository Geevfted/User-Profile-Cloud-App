name: Cloud Profile App Deployment

on:
  workflow_run:
    workflows: ["Cloud Profile App CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          script: |
            cd /opt/profile-app

            docker compose down || true

            docker compose pull

            docker compose up -d

            docker image prune -f